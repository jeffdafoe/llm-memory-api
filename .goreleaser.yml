version: 2

project_name: llm-memory-client

builds:
  - id: memory-sync
    main: ./cmd/memory-sync/
    dir: go/client
    binary: memory-sync
    ldflags:
      - -s -w -X github.com/jeffdafoe/llm-memory-api/go/client/internal/selfupdate.Version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

  - id: discuss
    main: ./cmd/discuss/
    dir: go/client
    binary: discuss
    ldflags:
      - -s -w -X github.com/jeffdafoe/llm-memory-api/go/client/internal/selfupdate.Version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

  - id: mail-send
    main: ./cmd/mail-send/
    dir: go/client
    binary: mail-send
    ldflags:
      - -s -w -X github.com/jeffdafoe/llm-memory-api/go/client/internal/selfupdate.Version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: memory-sync
    ids:
      - memory-sync
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "memory-sync_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: discuss
    ids:
      - discuss
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "discuss_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: mail-send
    ids:
      - mail-send
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "mail-send_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^ci:'
      - '^chore:'
