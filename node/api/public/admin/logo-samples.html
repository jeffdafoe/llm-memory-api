<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chip Bot - Pins Down</title>
<style>
    body {
        background: #0a0e17;
        color: #e2e8f0;
        font-family: 'Inter', sans-serif;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 60px 40px;
        gap: 80px;
        min-height: 100vh;
        margin: 0;
    }
    .sample {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
    }
    .sample h3 {
        color: #94a3b8;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
    }
    .logo-preview {
        width: 260px;
        height: 260px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f1420;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-preview {
        width: 200px;
        background: #0f1420;
        border-radius: 12px;
        padding: 20px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-preview .logo-area {
        margin-bottom: 16px;
        padding-bottom: 16px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        width: 100%;
        display: flex;
        justify-content: center;
    }
    .sidebar-preview .nav-item {
        width: 100%;
        padding: 10px 16px;
        border-radius: 8px;
        font-size: 13px;
        color: #94a3b8;
        text-align: left;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .sidebar-preview .nav-item.active {
        background: rgba(99, 164, 255, 0.12);
        color: #63a4ff;
    }
    .sidebar-preview .nav-item .dot {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        background: rgba(255,255,255,0.08);
    }
    .sidebar-preview .nav-item.active .dot {
        background: rgba(99, 164, 255, 0.3);
    }
</style>
</head>
<body>

<!-- Iteration 1: Slight tilt -->

                <!-- Folded-up front flap (the face panel) -->

                <rect x="122" y="108" width="4" height="18" rx="2" fill="#7cb8ff"/>
                <rect x="134" y="108" width="4" height="18" rx="2" fill="#7cb8ff"/>

                <!-- Pin feet (little circles at bottom) -->
                <circle cx="64" cy="128" r="3" fill="#5a9aef"/>
                <circle cx="76" cy="128" r="3" fill="#5a9aef"/>
                <circle cx="88" cy="128" r="3" fill="#5a9aef"/>
                <circle cx="100" cy="128" r="3" fill="#5a9aef"/>
                <circle cx="112" cy="128" r="3" fill="#5a9aef"/>
                <circle cx="124" cy="128" r="3" fill="#5a9aef"/>
                <circle cx="136" cy="128" r="3" fill="#5a9aef"/>
            </g>
            <!-- Sparkle (outside rotation) -->
            <circle cx="155" cy="38" r="2" fill="#ffd700" opacity="0.5"/>
            <path d="M155 34 L155 42 M151 38 L159 38" stroke="#ffd700" stroke-width="0.8" opacity="0.3"/>
        </svg>
    </div>
    <div class="sidebar-preview">
        <div class="logo-area">
            <svg width="64" height="64" viewBox="0 0 200 200" fill="none">
                <g transform="translate(100,100) rotate(-8) translate(-100,-100)">
                    <line x1="100" y1="28" x2="100" y2="48" stroke="#63a4ff" stroke-width="3" stroke-linecap="round"/>
                    <circle cx="100" cy="24" r="5" fill="#ffd700" opacity="0.8"/>
                    <rect x="58" y="48" width="84" height="60" rx="6" fill="#3a6cb8"/>

                    <rect x="74" y="108" width="4" height="18" rx="2" fill="#7cb8ff"/>
                    <rect x="86" y="108" width="4" height="18" rx="2" fill="#7cb8ff"/>
                    <rect x="98" y="108" width="4" height="18" rx="2" fill="#7cb8ff"/>
                    <rect x="110" y="108" width="4" height="18" rx="2" fill="#7cb8ff"/>

</div>
