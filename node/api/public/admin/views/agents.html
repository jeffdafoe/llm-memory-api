<div style="flex:1; display:flex; flex-direction:column; min-height:0; overflow:hidden;">
    <div class="page-header">
        <h2>Agents</h2>
    </div>
    <div class="page-content">
    <div class="table-wrap">
        <table class="fixed-table">
                <colgroup>
                    <col style="width: 30px;">
                    <col style="width: 10em;">
                    <col style="width: 10em;">
                    <col>
                    <col class="col-time">
                </colgroup>
                <thead>
                    <tr>
                        <th></th>
                        <th>Agent</th>
                        <th>Personality</th>
                        <th>Provider / Model</th>
                        <th class="time-cell">Last Seen</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="agent in agents" :key="agent.agent" @click="viewAgent(agent)" class="clickable">
                        <td style="text-align:center;">
                            <span v-if="agent.active_since" class="live-pulse-dot" style="width:6px; height:6px;" title="Active"></span>
                            <span v-else :class="'status-dot status-dot-' + agent.status" :title="agent.status"></span>
                        </td>
                        <td class="nowrap" :style="{ color: agentColor(agent.agent) }" :title="agent.agent">
                            {{ shortAgentName(agent.agent) }}
                            <i v-if="agent.virtual" class="icon-cpu virtual-icon" title="Virtual agent"></i>
                        </td>
                        <td class="muted truncate" style="font-style: italic;">{{ agent.personality || '' }}</td>
                        <td class="muted">
                            {{ [agent.provider, agent.model].filter(Boolean).join(' / ') || '—' }}
                            <br v-if="agent.pricing_info"><small v-if="agent.pricing_info" style="opacity: 0.7;">{{ agent.pricing_info }}</small>
                        </td>
                        <td class="time-cell ts">
                            {{ timeAgo(agent.last_seen) }}
                            <br><small style="opacity: 0.6;">reg. {{ formatShortDate(agent.registered_at) }}</small>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
