<div>
<!-- Unified Actor Dialog (create + edit) -->
<dialog :open="selectedActorConfig !== null" @close="closeActorConfig()">
    <article v-if="selectedActorConfig" class="actor-config-dialog">
        <header>
            <div>
                <h3 :style="selectedActorConfig.is_agent ? { color: agentColor(selectedActorConfig.name) } : {}">
                    <template v-if="actorDialogMode === 'create'">
                        {{ createSource === 'agents' ? 'Create Agent' : 'Create Actor' }}
                    </template>
                    <template v-else>
                        <i class="icon-shield" style="opacity: 0.5; margin-right: 4px;"></i>
                        {{ selectedActorConfig.name }}
                        <span v-if="selectedActorConfig.is_agent" class="badge badge-type-agent">agent</span>
                        <span v-if="selectedActorConfig.is_user" class="badge badge-type-user">user</span>
                        <span v-if="selectedActorConfig.virtual" class="badge badge-type-agent" style="background: var(--accent); color: #000;">virtual</span>
                    </template>
                </h3>
                <div class="actor-dialog-subtitle" v-if="actorDialogMode === 'create'">
                    {{ createSource === 'agents' ? 'Set the name and model configuration' : 'Set up identity and access' }}
                </div>
                <div class="actor-dialog-subtitle" v-else>
                    Permissions, visibility, and access controls
                </div>
            </div>
            <div style="display:flex; gap:4px;">
                <button v-if="actorDialogMode === 'edit' && canDo('actors', 'write')" class="btn btn-ghost btn-compact btn-danger" @click="deleteActor" :disabled="actorDeleting" title="Delete Actor"><i class="icon-trash-2"></i></button>
                <button aria-label="Close" rel="prev" @click="closeActorConfig()"></button>
            </div>
        </header>
        <div class="dialog-body" v-if="!actorConfigLoading">

            <!-- ─── Identity (create mode only) ─── -->
            <template v-if="actorDialogMode === 'create'">
                <div class="agent-card">
                    <div class="agent-card-header">
                        <div>
                            <span class="agent-card-title"><i class="icon-user"></i>{{ createSource === 'agents' ? 'Identity' : 'Identity' }}</span>
                            <div class="agent-card-description">Choose a name for your agent</div>
                        </div>
                    </div>
                    <label>Name
                        <input type="text" v-model="newActorName" placeholder="e.g. Ted" autofocus>
                        <small v-if="nameCheckMessage" class="name-check" :class="'name-check--' + nameCheckStatus">
                            {{ nameCheckMessage }}
                        </small>
                    </label>
                    <label v-if="createSource !== 'agents'" class="checkbox-label">
                        <input type="checkbox" v-model="newActorVirtual">
                        Virtual agent (API-backed, auto-responds)
                    </label>
                </div>
            </template>

            <!-- ─── Agent Configuration (create mode only — edit uses agent-dialog profile editor) ─── -->
            <template v-if="actorDialogMode === 'create'">
                <div class="agent-card">
                    <div class="agent-card-header">
                        <div>
                            <span class="agent-card-title"><i class="icon-cpu"></i>Model Configuration</span>
                            <div class="agent-card-description">Provider and credentials used for requests</div>
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <label>Provider
                            <custom-select v-model="editAgentProvider" @update:model-value="onEditProviderChange"
                                :options="[{ value: '', label: 'None' }].concat((providerRegistry || []).map(p => ({ value: p.name, label: p.label })))"
                                placeholder="None" />
                        </label>
                        <label>Model
                            <custom-select v-model="editAgentModel"
                                :options="[{ value: '', label: 'None' }].concat(modelsForProvider(editAgentProvider).map(m => ({ value: m.id, label: m.label + (m.deprecated ? ' (deprecated)' : '') })))"
                                :allow-custom="editAgentProvider === 'openrouter'"
                                placeholder="None" />
                        </label>
                    </div>
                    <small v-if="modelDeprecation(editAgentProvider, editAgentModel)" style="color: var(--error); display: block; margin: 4px 0;">
                        &#9888; {{ modelDeprecation(editAgentProvider, editAgentModel) }}
                    </small>

                    <label>Dream Mode
                        <custom-select v-model="editAgentDreamMode"
                            :options="[{ value: 'none', label: 'None' }, { value: 'companion', label: 'Companion' }, { value: 'technical', label: 'Technical' }]"
                            placeholder="None" />
                        <small class="ts">Post-session log analysis: companion (emotional/personal) or technical (work/code-focused)</small>
                    </label>

                    <!-- Virtual agent fields — API key for create -->
                    <template v-if="newActorVirtual || createSource === 'agents'">
                        <label>API Key
                            <input type="password" v-model="editAgentApiKey" placeholder="Provider API key (encrypted at rest)">
                        </label>

                        <label class="checkbox-label">
                            <input type="checkbox" v-model="editAgentLearningEnabled"> Learning enabled
                        </label>

                        <!-- Model-specific configuration -->
                        <div v-if="editAgentProvider && editAgentModel && Object.keys(capabilitiesFor(editAgentProvider, editAgentModel)).length" style="margin-top: 8px;">
                            <template v-for="(cap, key) in capabilitiesFor(editAgentProvider, editAgentModel)" :key="key">
                                <div v-if="capabilityVisible(cap, editAgentConfig)" style="margin-bottom: 8px;">
                                    <label v-if="cap.type === 'boolean'" class="checkbox-label" :title="'Default: ' + (cap.default ? 'on' : 'off')">
                                        <input type="checkbox" v-model="editAgentConfig[key]"> {{ cap.label }}
                                        <br><small class="ts">{{ cap.description }}</small>
                                    </label>
                                    <label v-else-if="cap.type === 'select'" :title="'Default: ' + (cap.default || 'none')">
                                        {{ cap.label }}
                                        <custom-select v-model="editAgentConfig[key]" :options="cap.options.map(opt => ({ value: opt, label: opt }))" />
                                        <small class="ts" style="display: block;">{{ cap.description }}</small>
                                    </label>
                                    <label v-else :title="'Default: ' + cap.default">
                                        {{ cap.label }}
                                        <input type="number" v-model.number="editAgentConfig[key]" :min="cap.min" :max="cap.max" :step="cap.step || 1" :placeholder="String(cap.default)">
                                        <small class="ts" style="display: block;">{{ cap.description }}</small>
                                    </label>
                                </div>
                            </template>
                        </div>
                    </template>

                </div>
            </template>

            <!-- ─── Sharing Visibility ─── -->
            <template v-if="actorDialogMode === 'edit'">
                <div class="agent-card">
                    <div class="agent-card-header">
                        <div>
                            <span class="agent-card-title"><i class="icon-share-2"></i>Sharing</span>
                        </div>
                        <span class="agent-card-state" :class="selectedActorConfig.visible_to_others ? 'agent-card-state--success' : ''">
                            {{ selectedActorConfig.visible_to_others ? 'Visible' : 'Private' }}
                        </span>
                    </div>
                    <div class="setting-row">
                        <div class="setting-row-text">
                            <div class="setting-row-title">Visible to others</div>
                            <div class="setting-row-description">Other users can find this actor when sharing memories</div>
                        </div>
                        <input type="checkbox" v-model="selectedActorConfig.visible_to_others" @change="toggleActorVisibleToOthers">
                    </div>
                </div>
            </template>

            <!-- ─── Virtual Agent Access (only for virtual agents, edit mode) ─── -->
            <template v-if="actorDialogMode === 'edit' && selectedActorConfig.virtual">
                <div class="agent-card">
                    <div class="agent-card-header">
                        <div>
                            <span class="agent-card-title"><i class="icon-users"></i>Virtual Agent Access</span>
                            <div class="agent-card-description">Who can use this virtual agent (send mail/chat to trigger responses)</div>
                        </div>
                        <span class="agent-card-state" :class="vaAccessPublic ? 'agent-card-state--accent' : ''">
                            {{ vaAccessPublic ? 'Public' : (vaAccessList.length + ' grant' + (vaAccessList.length !== 1 ? 's' : '')) }}
                        </span>
                    </div>

                    <div class="setting-row" style="margin-bottom: 12px;">
                        <div class="setting-row-text">
                            <div class="setting-row-title">Public access</div>
                            <div class="setting-row-description">Any user can use this agent</div>
                        </div>
                        <input type="checkbox" v-model="vaAccessPublic" @change="toggleVaPublicAccess">
                    </div>

                    <div v-if="!vaAccessPublic">
                        <p class="ts" style="margin-bottom: 8px;">The creator always has access. Add specific users below.</p>
                        <table class="actor-perm-table">
                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th style="width: 3em;"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="grant in vaAccessList" :key="grant.id">
                                    <td>{{ grant.grantee_name }}</td>
                                    <td><button class="btn btn-ghost btn-compact btn-danger" @click="removeVaAccessGrant(grant.id)" title="Revoke">&times;</button></td>
                                </tr>
                                <tr v-if="vaAccessList.length === 0">
                                    <td colspan="2" class="ts">No specific grants — only the creator has access.</td>
                                </tr>
                            </tbody>
                        </table>

                        <div style="margin-top: 8px;">
                            <div style="display: flex; gap: 8px; align-items: flex-end;">
                                <custom-select v-model="newVaAccessTarget" style="margin-bottom: 0; flex: 1;"
                                    :options="availableVaAccessTargets.map(a => ({ value: a.id, label: a.name }))"
                                    placeholder="Select user..." />
                                <button class="btn btn-secondary btn-compact" @click="addVaAccessGrant">Grant</button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ─── Agent Discovery ─── -->
            <template v-if="actorDialogMode === 'edit'">
                <div class="agent-card">
                    <div class="agent-card-header">
                        <div>
                            <span class="agent-card-title"><i class="icon-eye"></i>Who They Can See</span>
                            <div class="agent-card-description">Which other agents this actor can see when checking who's online</div>
                        </div>
                        <span class="agent-card-state" :class="actorHasWildcardVis ? 'agent-card-state--accent' : ''">
                            {{ actorHasWildcardVis ? 'All agents' : (actorVisibilityGrants.length + ' grant' + (actorVisibilityGrants.length !== 1 ? 's' : '')) }}
                        </span>
                    </div>

                    <div class="setting-row" style="margin-bottom: 12px;">
                        <div class="setting-row-text">
                            <div class="setting-row-title">See all agents</div>
                            <div class="setting-row-description">Wildcard visibility — can see every registered agent</div>
                        </div>
                        <input type="checkbox" v-model="actorHasWildcardVis">
                    </div>

                    <div v-if="!actorHasWildcardVis">
                        <table class="actor-perm-table">
                            <thead>
                                <tr>
                                    <th>Agent</th>
                                    <th style="width: 5em;">Type</th>
                                    <th style="width: 3em;"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="(grant, idx) in actorVisibilityGrants" :key="grant.target_actor_id">
                                    <td>{{ grant.target_name }}</td>
                                    <td><span v-if="grant.target_is_agent" class="badge badge-type-agent">agent</span> <span v-if="grant.target_is_user" class="badge badge-type-user">user</span></td>
                                    <td><button class="btn btn-ghost btn-compact btn-danger" @click="removeVisibilityGrant(idx)" title="Remove">&times;</button></td>
                                </tr>
                                <tr v-if="actorVisibilityGrants.length === 0">
                                    <td colspan="3" class="ts">No grants — can only see self.</td>
                                </tr>
                            </tbody>
                        </table>

                        <div style="margin-top: 8px;">
                            <div style="display: flex; gap: 8px; align-items: flex-end;">
                                <custom-select v-model="newVisibilityTarget" style="margin-bottom: 0; flex: 1;"
                                    :options="availableVisibilityTargets.map(a => ({ value: a.id, label: a.name + ' (' + [a.is_agent ? 'agent' : '', a.is_user ? 'user' : ''].filter(Boolean).join(', ') + ')' }))"
                                    placeholder="Select agent..." />
                                <button class="btn btn-secondary btn-compact" @click="addVisibilityGrant">Add</button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ─── Namespace Permissions ─── -->
            <template v-if="actorDialogMode === 'edit'">
                <div class="agent-card">
                    <div class="agent-card-header">
                        <div>
                            <span class="agent-card-title"><i class="icon-folder"></i>Namespace Permissions</span>
                            <div class="agent-card-description">All actors have implicit full access to their own namespace ({{ selectedActorConfig.name }})</div>
                        </div>
                        <span class="agent-card-state" :class="actorHasWildcardPerm ? 'agent-card-state--accent' : ''">
                            {{ actorHasWildcardPerm ? 'Full access' : (actorPermissions.length + ' namespace' + (actorPermissions.length !== 1 ? 's' : '')) }}
                        </span>
                    </div>

                    <div class="setting-row" style="margin-bottom: 12px;">
                        <div class="setting-row-text">
                            <div class="setting-row-title">Full access to all namespaces</div>
                            <div class="setting-row-description">Read, write, and delete in every namespace</div>
                        </div>
                        <input type="checkbox" v-model="actorHasWildcardPerm">
                    </div>

                    <table v-if="!actorHasWildcardPerm" class="actor-perm-table">
                        <thead>
                            <tr>
                                <th>Namespace</th>
                                <th style="width: 4em; text-align: center;">Read</th>
                                <th style="width: 4em; text-align: center;">Write</th>
                                <th style="width: 5em; text-align: center;">Delete</th>
                                <th style="width: 3em;"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="(perm, idx) in actorPermissions" :key="perm.namespace">
                                <td class="log-mono">{{ perm.namespace }}</td>
                                <td style="text-align: center;"><input type="checkbox" v-model="perm.can_read"></td>
                                <td style="text-align: center;"><input type="checkbox" v-model="perm.can_write"></td>
                                <td style="text-align: center;"><input type="checkbox" v-model="perm.can_delete"></td>
                                <td><button class="btn btn-ghost btn-compact btn-danger" @click="removePermissionRow(idx)" title="Remove">&times;</button></td>
                            </tr>
                            <tr v-if="actorPermissions.length === 0">
                                <td colspan="5" class="ts">No namespace permissions configured.</td>
                            </tr>
                        </tbody>
                    </table>

                    <div v-if="!actorHasWildcardPerm" style="margin-top: 8px;">
                        <div style="display: flex; gap: 8px; align-items: flex-end;">
                            <input type="text" v-model="newNamespaceInput" list="ns-suggestions" placeholder="Namespace..." style="margin-bottom: 0; flex: 1;" @keyup.enter="addPermissionRow">
                            <datalist id="ns-suggestions">
                                <option v-for="ns in availableNamespacesFiltered" :key="ns" :value="ns"></option>
                            </datalist>
                            <button class="btn btn-secondary btn-compact" @click="addPermissionRow">Add</button>
                        </div>
                    </div>
                </div>

                <!-- Save permissions + visibility -->
                <div style="margin-bottom: 16px;">
                    <button class="btn btn-primary" @click="saveActorConfig" :disabled="actorConfigSaving">
                        {{ actorConfigSaving ? 'Saving...' : 'Save Permissions' }}
                    </button>
                </div>
            </template>

            <!-- ─── UI Access ─── -->
            <template v-if="actorDialogMode === 'edit'">
                <div class="agent-card">
                    <div class="agent-card-header">
                        <div>
                            <span class="agent-card-title"><i class="icon-lock"></i>UI Access</span>
                        </div>
                        <span class="agent-card-state" :class="selectedActorConfig.is_user ? 'agent-card-state--success' : ''">
                            {{ selectedActorConfig.is_user ? 'Password set' : 'No access' }}
                        </span>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="password" v-model="actorPasswordInput" :placeholder="selectedActorConfig.is_user ? 'New password' : 'Set password'" style="flex: 1; max-width: 20em;">
                        <button class="btn btn-primary btn-compact" @click="setActorPassword" :disabled="actorPasswordSaving || !actorPasswordInput">
                            {{ actorPasswordSaving ? 'Saving...' : (selectedActorConfig.is_user ? 'Change' : 'Set') }}
                        </button>
                        <button v-if="selectedActorConfig.is_user" class="btn btn-ghost btn-compact btn-danger" @click="clearActorPassword" :disabled="actorPasswordSaving">
                            Remove
                        </button>
                    </div>
                </div>
            </template>

            <!-- ─── UI Access (create mode, config source only) ─── -->
            <template v-if="actorDialogMode === 'create' && createSource !== 'agents'">
                <div class="agent-card">
                    <div class="agent-card-header">
                        <div>
                            <span class="agent-card-title"><i class="icon-lock"></i>UI Access</span>
                            <div class="agent-card-description">Admin dashboard login credentials</div>
                        </div>
                    </div>
                    <label class="checkbox-label">
                        <input type="checkbox" v-model="newActorUiAccess">
                        UI Access (admin dashboard login)
                    </label>
                    <label v-if="newActorUiAccess">Password
                        <input type="password" v-model="newActorPassword" placeholder="Minimum 4 characters">
                    </label>
                </div>
            </template>

            <!-- ─── Welcome Template (create mode from config, non-virtual only) ─── -->
            <template v-if="actorDialogMode === 'create' && createSource !== 'agents' && !newActorVirtual">
                <div class="agent-card">
                    <div class="agent-card-header">
                        <div>
                            <span class="agent-card-title"><i class="icon-mail"></i>Welcome Template</span>
                            <div class="agent-card-description">Onboarding mail sent after creation</div>
                        </div>
                    </div>
                    <label>Template
                        <custom-select v-model="newActorTemplateId"
                            :options="[{ value: null, label: 'None' }].concat(welcomeTemplates.filter(t => t.kind === 'welcome').map(t => ({ value: t.id, label: t.name })))"
                            placeholder="None" />
                    </label>
                </div>
            </template>

            <!-- ─── Admin Permissions (edit mode, UI users only) ─── -->
            <template v-if="actorDialogMode === 'edit' && selectedActorConfig.is_user">
                <div class="agent-card">
                    <div class="agent-card-header">
                        <div>
                            <span class="agent-card-title"><i class="icon-shield"></i>Admin Permissions</span>
                            <div class="agent-card-description">What this user can access in the admin dashboard</div>
                        </div>
                        <span class="agent-card-state" :class="actorHasWildcardAdmin ? 'agent-card-state--accent' : ''">
                            {{ actorHasWildcardAdmin ? 'Full access' : (actorAdminPerms.filter(r => r.granted && r.granted.length > 0).length + ' resource' + (actorAdminPerms.filter(r => r.granted && r.granted.length > 0).length !== 1 ? 's' : '')) }}
                        </span>
                    </div>

                    <div class="setting-row" style="margin-bottom: 12px;">
                        <div class="setting-row-text">
                            <div class="setting-row-title">Full access</div>
                            <div class="setting-row-description">All resources, all actions</div>
                        </div>
                        <input type="checkbox" v-model="actorHasWildcardAdmin">
                    </div>

                    <div v-if="!actorHasWildcardAdmin">
                        <table style="margin-bottom: 0;">
                            <thead>
                                <tr>
                                    <th>Resource</th>
                                    <th style="text-align: center;">Read</th>
                                    <th style="text-align: center;">Write</th>
                                    <th style="text-align: center;">Delete</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="(row, idx) in actorAdminPerms" :key="row.resource">
                                    <td>{{ row.label }}<br><small class="ts">{{ row.hint }}</small></td>
                                    <td style="text-align: center;">
                                        <input v-if="row.actions.includes('read')" type="checkbox" :checked="adminPermChecked(idx, 'read')" @change="toggleAdminPerm(idx, 'read')">
                                        <span v-else class="ts">—</span>
                                    </td>
                                    <td style="text-align: center;">
                                        <input v-if="row.actions.includes('write')" type="checkbox" :checked="adminPermChecked(idx, 'write')" @change="toggleAdminPerm(idx, 'write')">
                                        <span v-else class="ts">—</span>
                                    </td>
                                    <td style="text-align: center;">
                                        <input v-if="row.actions.includes('delete')" type="checkbox" :checked="adminPermChecked(idx, 'delete')" @change="toggleAdminPerm(idx, 'delete')">
                                        <span v-else class="ts">—</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div style="margin-top: 12px;">
                        <button class="btn btn-primary" @click="saveActorConfig" :disabled="actorConfigSaving">
                            {{ actorConfigSaving ? 'Saving...' : 'Save All' }}
                        </button>
                    </div>
                </div>
            </template>

            <!-- ─── Create result / actions ─── -->
            <template v-if="actorDialogMode === 'create'">
                <div v-if="newActorPassphrase && !newActorVirtual" class="passphrase-bar passphrase-result">
                    Passphrase: <code>{{ newActorPassphrase }}</code>
                    <span class="ts">(save this — it won't be shown again)</span>
                </div>
                <div v-if="newActorPassphrase && newActorVirtual" class="passphrase-bar passphrase-result">
                    Virtual agent created.
                </div>
                <div class="dialog-actions">
                    <button class="btn btn-secondary" @click="closeActorConfig()">{{ newActorPassphrase ? 'Done' : 'Cancel' }}</button>
                    <button class="btn btn-primary" @click="createActor" :disabled="newActorCreating || !newActorName || newActorPassphrase || nameCheckStatus !== 'available'">
                        {{ newActorCreating ? 'Creating...' : 'Create' }}
                    </button>
                </div>
            </template>

        </div>
        <div v-else class="dialog-body" style="padding: 24px;">
            <p class="ts">Loading...</p>
        </div>
    </article>
</dialog>
</div>
