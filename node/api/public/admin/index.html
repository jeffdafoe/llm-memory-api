<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory API Admin</title>
</head>
<body>
    <div id="app">
        <!-- Login screen -->
        <main v-if="!authenticated" class="login-page">
            <div class="login-card">
                <div class="login-brand">
                    <span class="login-brand-accent">LLM</span> Memory
                </div>
                <div class="login-subtitle">Admin Dashboard</div>
                <form @submit.prevent="login">
                    <label>
                        Username
                        <input type="text" v-model="loginForm.username" required autofocus>
                    </label>
                    <label>
                        Password
                        <input type="password" v-model="loginForm.password" required>
                    </label>
                    <p v-if="loginError" class="error">{{ loginError }}</p>
                    <button type="submit" class="login-btn" :disabled="loggingIn">
                        {{ loggingIn ? 'Logging in...' : 'Log in' }}
                    </button>
                </form>
            </div>
        </main>

        <!-- App shell -->
        <div v-else>
            <nav class="container-fluid">
                <ul>
                    <li><strong>Memory API Admin — {{ viewTitle }}</strong></li>
                </ul>
                <ul>
                    <li v-if="canDo('dashboard', 'read')"><a href="#" :class="{ active: currentView === 'dashboard' }" @click.prevent="currentView = 'dashboard'">Dashboard</a></li>
                    <li v-if="canDo('agents', 'read')"><a href="#" :class="{ active: currentView === 'agents' }" @click.prevent="currentView = 'agents'">Agents</a></li>
                    <li v-if="canDo('comms', 'read')"><a href="#" :class="{ active: currentView === 'comms' }" @click.prevent="currentView = 'comms'">Communications</a></li>
                    <li v-if="canDo('notes', 'read')"><a href="#" :class="{ active: currentView === 'notes' }" @click.prevent="currentView = 'notes'">Notes</a></li>
                    <li v-if="canDo('config', 'read')"><a href="#" :class="{ active: currentView === 'config' }" @click.prevent="currentView = 'config'">Configuration</a></li>
                    <li><a href="#" @click.prevent="showChangePassword = true" title="Change password"><i class="icon-key-round"></i></a></li>
                    <li><a href="#" @click.prevent="logout">Logout</a></li>
                </ul>
            </nav>

            <!-- Global reindex banner -->
            <div v-if="reindexStatus && reindexStatus.running" class="reindex-banner">
                Reindexing vectors... {{ reindexStatus.current }}/{{ reindexStatus.total }} docs
            </div>

            <main class="container-fluid">
                <!-- View components -->
                <dashboard-view v-if="currentView === 'dashboard' && dashboard"></dashboard-view>
                <agents-view v-if="currentView === 'agents'"></agents-view>
                <comms-view v-if="currentView === 'comms'"></comms-view>
                <config-view v-if="currentView === 'config'"></config-view>
                <notes-view v-if="currentView === 'notes'"></notes-view>

                <!-- Dialogs -->
                <actor-dialogs></actor-dialogs>
                <agent-dialog></agent-dialog>
                <misc-dialogs></misc-dialogs>

                <!-- Toast notification -->
                <div v-if="toast" class="toast" :class="'toast-' + toast.type" @click="toast = null">
                    {{ toast.text }}
                </div>
            </main>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
