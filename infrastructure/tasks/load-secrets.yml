---
- name: Check if local-secrets.yml exists
  stat:
    path: "{{ playbook_dir }}/../local-secrets.yml"
  register: secrets_file
  delegate_to: localhost
  become: no

- name: Set whether prompting is needed
  set_fact:
    should_prompt: "{{ not secrets_file.stat.exists or (reconfigure | default(false) | bool) }}"

- name: Load existing secrets for defaults
  include_vars:
    file: "{{ playbook_dir }}/../local-secrets.yml"
  when: secrets_file.stat.exists and should_prompt

- name: Prompt for server hostname
  pause:
    prompt: "Server hostname (e.g. memory.example.com) [{{ server_name | default('') }}]"
  register: prompt_server_name
  when: should_prompt
  delegate_to: localhost
  become: no

- name: Prompt for certbot email
  pause:
    prompt: "Email address for Let's Encrypt SSL certificates [{{ certbot_email | default('') }}]"
  register: prompt_certbot_email
  when: should_prompt
  delegate_to: localhost
  become: no

- name: Prompt for database password
  pause:
    prompt: "PostgreSQL password for the '{{ database_user }}' database user [{{ database_password | default('memory_api_dev') }}]"
  register: prompt_database_password
  when: should_prompt
  delegate_to: localhost
  become: no

- name: Prompt for OpenAI API key
  pause:
    prompt: "OpenAI API key for embeddings [{{ openai_api_key | default('') }}]"
  register: prompt_openai_api_key
  when: should_prompt
  delegate_to: localhost
  become: no

- name: Prompt for admin username
  pause:
    prompt: "Admin dashboard username [{{ admin_username | default('admin') }}]"
  register: prompt_admin_username
  when: should_prompt
  delegate_to: localhost
  become: no

- name: Prompt for admin password
  pause:
    prompt: "Admin dashboard password [{{ admin_password | default('') }}]"
  register: prompt_admin_password
  when: should_prompt
  delegate_to: localhost
  become: no

- name: Write local-secrets.yml
  copy:
    content: |
      # Memory API local secrets (auto-generated, gitignored)
      # Delete this file and re-run the playbook to be prompted again.
      server_name: "{{ prompt_server_name.user_input | default(server_name | default(''), true) }}"
      certbot_email: "{{ prompt_certbot_email.user_input | default(certbot_email | default(''), true) }}"
      database_password: "{{ prompt_database_password.user_input | default(database_password | default('memory_api_dev'), true) }}"
      openai_api_key: "{{ prompt_openai_api_key.user_input | default(openai_api_key | default(''), true) }}"
      admin_username: "{{ prompt_admin_username.user_input | default(admin_username | default('admin'), true) }}"
      admin_password: "{{ prompt_admin_password.user_input | default(admin_password | default(''), true) }}"
    dest: "{{ playbook_dir }}/../local-secrets.yml"
    mode: '0600'
  when: should_prompt
  delegate_to: localhost
  become: no

- name: Load local secrets
  include_vars:
    file: "{{ playbook_dir }}/../local-secrets.yml"
