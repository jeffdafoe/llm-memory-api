# Shared variables across all environments

# PostgreSQL
postgresql_version: "17"

# Node.js
nodejs_version: "20"

# Memory API
memory_api_port: 3100
project_name: memory-api
repo_root: /opt/llm-memory-api
project_root: /var/www/memory-api
git_repository: "https://github.com/jeffdafoe/llm-memory-api.git"

# Public-facing domains serve a landing page at /
# Internal domains redirect / → /admin/
public_domains:
  - llm-memory.net
  - llm-memory.org

# SSL — certbot_email and server_names are prompted during install
# and stored in local-secrets.yml (gitignored)
# server_names is comma-separated (e.g. "memory.example.com,memory2.example.com")
# First domain is primary, all domains get their own SSL cert and nginx server block
