---
- name: Ensure service user exists
  user:
    name: "{{ app_user }}"
    system: yes
    shell: /usr/sbin/nologin
    home: "/home/{{ app_user }}"
    create_home: yes

- name: Create log directory
  file:
    path: /var/log/llm-memory-api
    state: directory
    owner: "{{ app_user }}"
    mode: "0755"

- name: Configure log rotation
  template:
    src: logrotate.j2
    dest: /etc/logrotate.d/llm-memory-api
    mode: "0644"

# Socket Firewall (sfw) — wraps `npm install` to block known-malicious
# packages at the network layer before they can land on disk. Installed
# globally so all subsequent npm tasks below can prefix `sfw`. The npm
# install of sfw itself is unwrapped (chicken-and-egg) — we trust this
# one package from socket.dev. Free tier, no API key, anonymous telemetry.
- name: Install Socket Firewall (sfw) globally
  npm:
    name: sfw
    global: yes
    state: present

- name: Create deployment directory
  file:
    path: "{{ project_root }}"
    state: directory
    owner: "{{ app_user }}"
    mode: "0755"
  when: repo_root != project_root

- name: Install build dependencies in repo
  command: sfw npm install
  args:
    chdir: "{{ repo_root }}/node/api"
  when: repo_root != project_root

- name: Build admin dashboard
  command: npx vite build
  args:
    chdir: "{{ repo_root }}/node/api"
  when: repo_root != project_root

- name: Deploy application code
  synchronize:
    src: "{{ repo_root }}/node/api/"
    dest: "{{ project_root }}/"
    delete: yes
  delegate_to: "{{ inventory_hostname }}"
  when: repo_root != project_root

- name: Deploy static assets
  synchronize:
    src: "{{ repo_root }}/static/"
    dest: "{{ project_root }}/static/"
    delete: yes
  delegate_to: "{{ inventory_hostname }}"
  when: repo_root != project_root

- name: Deploy maintenance page
  copy:
    src: "{{ repo_root }}/node/maintenance.html"
    dest: "{{ project_root }}/maintenance.html"
    remote_src: yes
  when: repo_root != project_root

- name: Deploy migrations
  synchronize:
    src: "{{ repo_root }}/migrations/"
    dest: "{{ project_root }}/migrations/"
    delete: yes
  delegate_to: "{{ inventory_hostname }}"
  when: repo_root != project_root

- name: Set deployment directory ownership
  file:
    path: "{{ project_root }}"
    owner: "{{ app_user }}"
    recurse: yes
  when: repo_root != project_root

- name: Create secrets directory
  file:
    path: /etc/memory-api
    state: directory
    owner: "{{ app_user }}"
    mode: "0700"

- name: Deploy environment file
  template:
    src: env.j2
    dest: /etc/memory-api/env
    mode: "0600"
  notify: Restart memory-api

- name: Install npm dependencies
  command: sfw npm install --omit=dev
  args:
    chdir: "{{ project_root }}"
  become_user: "{{ app_user }}"
  when: repo_root != project_root

- name: Install npm dependencies (development)
  command: sfw npm install
  args:
    chdir: "{{ project_root }}/node/api"
  become_user: "{{ app_user }}"
  when: repo_root == project_root

- name: Create systemd service
  template:
    src: memory-api.service.j2
    dest: /etc/systemd/system/memory-api.service
  notify:
    - Reload systemd
    - Restart memory-api

- name: Enable and start memory-api service
  service:
    name: memory-api
    enabled: yes
    state: started

- name: Ensure cleanup script is executable
  file:
    path: "{{ project_root }}/scripts/db-cleanup.sh"
    mode: "0755"

- name: Configure daily database cleanup cron job
  cron:
    name: "memory-api db cleanup"
    minute: "15"
    hour: "3"
    job: "{{ project_root }}/scripts/db-cleanup.sh >> /var/log/llm-memory-api/db-cleanup.log 2>&1"

- name: Ensure backup script is executable
  file:
    path: "{{ project_root }}/scripts/pg-backup.sh"
    mode: "0755"

- name: Configure daily PostgreSQL backup cron job
  cron:
    name: "postgresql daily backup"
    minute: "0"
    hour: "2"
    job: "{{ project_root }}/scripts/pg-backup.sh >> /var/log/llm-memory-api/pg-backup.log 2>&1"

- name: Deploy tools (Go client binaries)
  include_tasks: deploy-tools.yml
