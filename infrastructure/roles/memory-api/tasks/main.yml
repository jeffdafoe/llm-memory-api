---
- name: Clone repository
  git:
    repo: "{{ git_repository }}"
    dest: "{{ project_root }}"
    version: "{{ deploy_branch | default('main') }}"
    force: yes
  become_user: "{{ app_user }}"

- name: Create secrets directory
  file:
    path: /etc/memory-api
    state: directory
    mode: "0700"

- name: Deploy environment file
  template:
    src: env.j2
    dest: /etc/memory-api/env
    mode: "0600"
  notify: Restart memory-api

- name: Install npm dependencies
  npm:
    path: "{{ project_root }}/node/api"
    production: yes
  become_user: "{{ app_user }}"

- name: Create systemd service
  template:
    src: memory-api.service.j2
    dest: /etc/systemd/system/memory-api.service
  notify:
    - Reload systemd
    - Restart memory-api

- name: Enable and start memory-api service
  service:
    name: memory-api
    enabled: yes
    state: started
