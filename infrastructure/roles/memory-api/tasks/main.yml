---
- name: Ensure service user exists
  user:
    name: "{{ app_user }}"
    system: yes
    shell: /usr/sbin/nologin
    home: "/home/{{ app_user }}"
    create_home: yes

- name: Create log directory
  file:
    path: /var/log/llm-memory-api
    state: directory
    owner: "{{ app_user }}"
    mode: "0755"

- name: Configure log rotation
  template:
    src: logrotate.j2
    dest: /etc/logrotate.d/llm-memory-api
    mode: "0644"

- name: Create deployment directory
  file:
    path: "{{ project_root }}"
    state: directory
    owner: "{{ app_user }}"
    mode: "0755"
  when: repo_root != project_root

- name: Deploy application code
  synchronize:
    src: "{{ repo_root }}/node/api/"
    dest: "{{ project_root }}/"
    delete: yes
  delegate_to: "{{ inventory_hostname }}"
  when: repo_root != project_root

- name: Deploy migrations
  synchronize:
    src: "{{ repo_root }}/migrations/"
    dest: "{{ project_root }}/migrations/"
    delete: yes
  delegate_to: "{{ inventory_hostname }}"
  when: repo_root != project_root

- name: Set deployment directory ownership
  file:
    path: "{{ project_root }}"
    owner: "{{ app_user }}"
    recurse: yes
  when: repo_root != project_root

- name: Create secrets directory
  file:
    path: /etc/memory-api
    state: directory
    owner: "{{ app_user }}"
    mode: "0700"

- name: Deploy environment file
  template:
    src: env.j2
    dest: /etc/memory-api/env
    mode: "0600"
  notify: Restart memory-api

- name: Install npm dependencies
  npm:
    path: "{{ project_root }}"
    production: yes
  become_user: "{{ app_user }}"
  when: repo_root != project_root

- name: Install npm dependencies (development)
  npm:
    path: "{{ project_root }}/node/api"
  become_user: "{{ app_user }}"
  when: repo_root == project_root

- name: Create systemd service
  template:
    src: memory-api.service.j2
    dest: /etc/systemd/system/memory-api.service
  notify:
    - Reload systemd
    - Restart memory-api

- name: Enable and start memory-api service
  service:
    name: memory-api
    enabled: yes
    state: started

- name: Deploy database cleanup script
  copy:
    src: "{{ repo_root }}/infrastructure/scripts/db-cleanup.sh"
    dest: /usr/local/bin/memory-api-db-cleanup
    mode: "0755"
    remote_src: yes

- name: Configure daily database cleanup cron job
  cron:
    name: "memory-api db cleanup"
    minute: "15"
    hour: "3"
    job: "/usr/local/bin/memory-api-db-cleanup >> /var/log/llm-memory-api/db-cleanup.log 2>&1"
