---
# Download Go client binaries from GitHub Releases and deploy to /var/www/tools/
# These are served by nginx at /tools/ for agent onboarding

- name: Create tools directory
  file:
    path: /var/www/tools
    state: directory
    owner: www-data
    mode: "0755"

- name: Get latest release tag from GitHub
  uri:
    url: "https://api.github.com/repos/jeffdafoe/llm-memory-api/releases/latest"
    return_content: yes
  register: latest_release

- name: Set release version
  set_fact:
    release_version: "{{ latest_release.json.tag_name | regex_replace('^v', '') }}"
    release_tag: "{{ latest_release.json.tag_name }}"

- name: Check current deployed version
  stat:
    path: /var/www/tools/.version
  register: version_file

- name: Read current version
  slurp:
    src: /var/www/tools/.version
  register: current_version
  when: version_file.stat.exists

- name: Set current version fact
  set_fact:
    deployed_version: "{{ (current_version.content | b64decode | trim) if version_file.stat.exists else 'none' }}"

- name: Download and extract binaries
  when: deployed_version != release_version
  block:
    - name: Create temp directory for downloads
      tempfile:
        state: directory
        prefix: tools-download-
      register: download_dir

    - name: Download Linux amd64 archive
      get_url:
        url: "https://github.com/jeffdafoe/llm-memory-api/releases/download/{{ release_tag }}/memory-sync_{{ release_version }}_linux_amd64.tar.gz"
        dest: "{{ download_dir.path }}/linux_amd64.tar.gz"

    - name: Download Linux arm64 archive
      get_url:
        url: "https://github.com/jeffdafoe/llm-memory-api/releases/download/{{ release_tag }}/memory-sync_{{ release_version }}_linux_arm64.tar.gz"
        dest: "{{ download_dir.path }}/linux_arm64.tar.gz"

    - name: Download Darwin amd64 archive
      get_url:
        url: "https://github.com/jeffdafoe/llm-memory-api/releases/download/{{ release_tag }}/memory-sync_{{ release_version }}_darwin_amd64.tar.gz"
        dest: "{{ download_dir.path }}/darwin_amd64.tar.gz"

    - name: Download Darwin arm64 archive
      get_url:
        url: "https://github.com/jeffdafoe/llm-memory-api/releases/download/{{ release_tag }}/memory-sync_{{ release_version }}_darwin_arm64.tar.gz"
        dest: "{{ download_dir.path }}/darwin_arm64.tar.gz"

    - name: Download Windows amd64 archive
      get_url:
        url: "https://github.com/jeffdafoe/llm-memory-api/releases/download/{{ release_tag }}/memory-sync_{{ release_version }}_windows_amd64.zip"
        dest: "{{ download_dir.path }}/windows_amd64.zip"

    - name: Download Windows arm64 archive
      get_url:
        url: "https://github.com/jeffdafoe/llm-memory-api/releases/download/{{ release_tag }}/memory-sync_{{ release_version }}_windows_arm64.zip"
        dest: "{{ download_dir.path }}/windows_arm64.zip"

    - name: Extract Linux amd64
      unarchive:
        src: "{{ download_dir.path }}/linux_amd64.tar.gz"
        dest: "{{ download_dir.path }}"
        remote_src: yes

    - name: Deploy Linux amd64 binary
      copy:
        src: "{{ download_dir.path }}/memory-sync"
        dest: /var/www/tools/memory-sync_linux_amd64
        remote_src: yes
        mode: "0755"

    - name: Extract Linux arm64
      unarchive:
        src: "{{ download_dir.path }}/linux_arm64.tar.gz"
        dest: "{{ download_dir.path }}"
        remote_src: yes

    - name: Deploy Linux arm64 binary
      copy:
        src: "{{ download_dir.path }}/memory-sync"
        dest: /var/www/tools/memory-sync_linux_arm64
        remote_src: yes
        mode: "0755"

    - name: Extract Darwin amd64
      unarchive:
        src: "{{ download_dir.path }}/darwin_amd64.tar.gz"
        dest: "{{ download_dir.path }}"
        remote_src: yes

    - name: Deploy Darwin amd64 binary
      copy:
        src: "{{ download_dir.path }}/memory-sync"
        dest: /var/www/tools/memory-sync_darwin_amd64
        remote_src: yes
        mode: "0755"

    - name: Extract Darwin arm64
      unarchive:
        src: "{{ download_dir.path }}/darwin_arm64.tar.gz"
        dest: "{{ download_dir.path }}"
        remote_src: yes

    - name: Deploy Darwin arm64 binary
      copy:
        src: "{{ download_dir.path }}/memory-sync"
        dest: /var/www/tools/memory-sync_darwin_arm64
        remote_src: yes
        mode: "0755"

    - name: Extract Windows amd64
      unarchive:
        src: "{{ download_dir.path }}/windows_amd64.zip"
        dest: "{{ download_dir.path }}"
        remote_src: yes

    - name: Deploy Windows amd64 binary
      copy:
        src: "{{ download_dir.path }}/memory-sync.exe"
        dest: /var/www/tools/memory-sync_windows_amd64.exe
        remote_src: yes
        mode: "0755"

    - name: Extract Windows arm64
      unarchive:
        src: "{{ download_dir.path }}/windows_arm64.zip"
        dest: "{{ download_dir.path }}"
        remote_src: yes

    - name: Deploy Windows arm64 binary
      copy:
        src: "{{ download_dir.path }}/memory-sync.exe"
        dest: /var/www/tools/memory-sync_windows_arm64.exe
        remote_src: yes
        mode: "0755"

    - name: Write version file
      copy:
        content: "{{ release_version }}"
        dest: /var/www/tools/.version

    - name: Clean up download directory
      file:
        path: "{{ download_dir.path }}"
        state: absent

- name: Deploy tools landing page
  template:
    src: tools-index.html.j2
    dest: /var/www/tools/index.html
    mode: "0644"
