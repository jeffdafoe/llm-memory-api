---
# Download Go client binaries from GitHub Releases and deploy to /var/www/tools/
# These are served by nginx at /tools/ for agent onboarding

- name: Create tools directory
  file:
    path: /var/www/tools
    state: directory
    owner: www-data
    mode: "0755"

- name: Get latest release tag from GitHub
  uri:
    url: "https://api.github.com/repos/jeffdafoe/llm-memory-api/releases/latest"
    return_content: yes
  register: latest_release

- name: Set release version
  set_fact:
    release_version: "{{ latest_release.json.tag_name | regex_replace('^v', '') }}"
    release_tag: "{{ latest_release.json.tag_name }}"

- name: Check current deployed version
  stat:
    path: /var/www/tools/.version
  register: version_file

- name: Read current version
  slurp:
    src: /var/www/tools/.version
  register: current_version
  when: version_file.stat.exists

- name: Set current version fact
  set_fact:
    deployed_version: "{{ (current_version.content | b64decode | trim) if version_file.stat.exists else 'none' }}"

- name: Download and extract binaries
  when: deployed_version != release_version
  block:
    - name: Create temp directory for downloads
      tempfile:
        state: directory
        prefix: tools-download-
      register: download_dir

    # Download + extract + deploy each binary × platform combination.
    # tool_matrix lists the binaries that ship via the tools landing page.
    # platform_matrix enumerates goreleaser archive targets. The loop below
    # replaces what used to be ~30 repetitive tasks with a single pair.
    - name: Build tool × platform matrix
      set_fact:
        tools_platforms: "{{ tools_platforms | default([]) + [{'tool': item[0], 'goos': item[1].goos, 'goarch': item[1].goarch, 'ext': item[1].ext, 'archive_ext': item[1].archive_ext}] }}"
      loop: "{{ ['memory-sync', 'mail-send'] | product([
          {'goos': 'linux',   'goarch': 'amd64', 'ext': '',     'archive_ext': 'tar.gz'},
          {'goos': 'linux',   'goarch': 'arm64', 'ext': '',     'archive_ext': 'tar.gz'},
          {'goos': 'darwin',  'goarch': 'amd64', 'ext': '',     'archive_ext': 'tar.gz'},
          {'goos': 'darwin',  'goarch': 'arm64', 'ext': '',     'archive_ext': 'tar.gz'},
          {'goos': 'windows', 'goarch': 'amd64', 'ext': '.exe', 'archive_ext': 'zip'},
          {'goos': 'windows', 'goarch': 'arm64', 'ext': '.exe', 'archive_ext': 'zip'}
        ]) | list }}"

    - name: Download release archives
      get_url:
        url: "https://github.com/jeffdafoe/llm-memory-api/releases/download/{{ release_tag }}/{{ item.tool }}_{{ release_version }}_{{ item.goos }}_{{ item.goarch }}.{{ item.archive_ext }}"
        dest: "{{ download_dir.path }}/{{ item.tool }}_{{ item.goos }}_{{ item.goarch }}.{{ item.archive_ext }}"
      loop: "{{ tools_platforms }}"
      loop_control:
        label: "{{ item.tool }} {{ item.goos }}/{{ item.goarch }}"

    - name: Create per-binary extract subdirs
      file:
        path: "{{ download_dir.path }}/{{ item.tool }}_{{ item.goos }}_{{ item.goarch }}"
        state: directory
      loop: "{{ tools_platforms }}"
      loop_control:
        label: "{{ item.tool }} {{ item.goos }}/{{ item.goarch }}"

    - name: Extract release archives
      unarchive:
        src: "{{ download_dir.path }}/{{ item.tool }}_{{ item.goos }}_{{ item.goarch }}.{{ item.archive_ext }}"
        # Extract each into its own subdir so binaries from different tools
        # don't clobber each other when extracted to the same directory.
        dest: "{{ download_dir.path }}/{{ item.tool }}_{{ item.goos }}_{{ item.goarch }}"
        remote_src: yes
      loop: "{{ tools_platforms }}"
      loop_control:
        label: "{{ item.tool }} {{ item.goos }}/{{ item.goarch }}"

    - name: Deploy platform binaries
      copy:
        src: "{{ download_dir.path }}/{{ item.tool }}_{{ item.goos }}_{{ item.goarch }}/{{ item.tool }}{{ item.ext }}"
        dest: "/var/www/tools/{{ item.tool }}_{{ item.goos }}_{{ item.goarch }}{{ item.ext }}"
        remote_src: yes
        mode: "0755"
      loop: "{{ tools_platforms }}"
      loop_control:
        label: "{{ item.tool }} {{ item.goos }}/{{ item.goarch }}"

    - name: Write version file
      copy:
        content: "{{ release_version }}"
        dest: /var/www/tools/.version

    - name: Clean up download directory
      file:
        path: "{{ download_dir.path }}"
        state: absent

- name: Deploy tools landing page
  template:
    src: tools-index.html.j2
    dest: /var/www/tools/index.html
    mode: "0644"
