---
- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Remove legacy catch-all page
  file:
    path: /var/www/index.html
    state: absent

- name: Deploy rate limiting configuration
  template:
    src: rate-limiting.conf.j2
    dest: /etc/nginx/conf.d/rate-limiting.conf
  notify: Reload nginx

- name: Remove legacy hand-managed nginx configs
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/llm-memory.conf
    - /etc/nginx/sites-available/llm-memory.conf
    - /etc/nginx/sites-enabled/memory.jeffdafoe.com.conf
    - /etc/nginx/sites-available/memory.jeffdafoe.com.conf
  notify: Reload nginx

- name: Create nginx site configuration
  template:
    src: "site-{{ deploy_environment }}.conf.j2"
    dest: "/etc/nginx/sites-available/{{ project_name }}.conf"
  notify: Reload nginx

- name: Enable nginx site
  file:
    src: "/etc/nginx/sites-available/{{ project_name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ project_name }}.conf"
    state: link
  notify: Reload nginx

- name: Ensure nginx is running
  service:
    name: nginx
    state: started
    enabled: yes

# ── fail2ban for WordPress/CMS scanning bots ──

- name: Install fail2ban
  apt:
    name: fail2ban
    state: present

- name: Deploy WordPress scanning filter
  template:
    src: fail2ban-wordpress-filter.conf.j2
    dest: /etc/fail2ban/filter.d/nginx-wordpress.conf
  notify: Restart fail2ban

- name: Deploy WordPress scanning jail
  template:
    src: fail2ban-wordpress-jail.conf.j2
    dest: /etc/fail2ban/jail.d/nginx-wordpress.conf
  notify: Restart fail2ban

- name: Ensure fail2ban is running
  service:
    name: fail2ban
    state: started
    enabled: yes
