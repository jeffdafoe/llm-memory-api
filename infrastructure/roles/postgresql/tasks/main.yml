---
- name: Check if PostgreSQL is already installed
  stat:
    path: /usr/bin/psql
  register: postgresql_installed

- name: Download PostgreSQL repository key
  get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: /etc/apt/keyrings/postgresql.asc
    mode: '0644'
  when: not postgresql_installed.stat.exists

- name: Add PostgreSQL repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/postgresql.asc] http://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: postgresql
  when: not postgresql_installed.stat.exists

- name: Install PostgreSQL {{ postgresql_version }}
  apt:
    name:
      - "postgresql-{{ postgresql_version }}"
      - "postgresql-client-{{ postgresql_version }}"
      - python3-psycopg2
    state: present
    update_cache: yes
  when: not postgresql_installed.stat.exists

- name: Install pgvector extension package
  apt:
    name: "postgresql-{{ postgresql_version }}-pgvector"
    state: present
    update_cache: yes

- name: Ensure PostgreSQL is running
  service:
    name: postgresql
    state: started
    enabled: yes

- name: Deploy pg_hba.conf
  template:
    src: pg_hba.conf.j2
    dest: /etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf
    owner: postgres
    group: postgres
    mode: '0640'
  notify: Reload postgresql

- name: Create database user
  become_user: postgres
  postgresql_user:
    name: "{{ database_user }}"
    password: "{{ database_password }}"
    state: present
  no_log: true

- name: Create database
  become_user: postgres
  postgresql_db:
    name: "{{ database_name }}"
    owner: "{{ database_user }}"
    state: present

- name: Enable pgvector extension
  become_user: postgres
  postgresql_ext:
    name: vector
    db: "{{ database_name }}"
    state: present

- name: Create migrations_applied table
  become_user: postgres
  postgresql_query:
    db: "{{ database_name }}"
    query: |
      CREATE TABLE IF NOT EXISTS migrations_applied (
        migration_id VARCHAR(50) PRIMARY KEY,
        applied_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
      );
