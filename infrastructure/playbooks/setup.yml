---
- name: Provision Memory API
  hosts: all
  become: yes
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Load secrets
      include_tasks: ../tasks/load-secrets.yml

    - name: Display environment
      debug:
        msg: "Setting up {{ deploy_environment }} environment on {{ inventory_hostname }}"

  roles:
    - role: ../roles/common
    - role: ../roles/nodejs
    - role: ../roles/postgresql
    - role: ../roles/apache-proxy
      when: deploy_environment == 'production'
    - role: ../roles/memory-api

  tasks:
    - name: Run pending migrations
      include_tasks: ../tasks/run-migrations.yml
