---
- name: Deploy Memory API
  hosts: all
  become: yes
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Load secrets
      include_tasks: ../tasks/load-secrets.yml
      when: deploy_environment == 'development'

    - name: Display deployment info
      debug:
        msg: "Deploying to {{ deploy_environment }} environment"

  roles:
    - role: ../roles/memory-api

  tasks:
    - name: Run pending migrations
      include_tasks: ../tasks/run-migrations.yml
